---
name: Release

on:
  workflow_dispatch:
    inputs:
      container:
        type: string
        description: The name of the container to build
        required: true
      release:
        type: boolean
        description: Whether to release the container
        required: false
        default: false
  pull_request:
    branches: ["main"]
    paths: ["containers/**"]
  push:
    branches: ["main"]
    paths: ["containers/**"]

jobs:
  changed:
    name: Get Changed Containers
    runs-on: ubuntu-latest
    outputs:
      containers: ${{ steps.containers.outputs.containers }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - if: ${{ github.event_name != 'workflow_dispatch' }}
        name: Determine Changed Directories
        uses: tj-actions/changed-files@2f7c5bfce28377bc069a65ba478de0a74aa0ca32 # v46.0.1
        id: changed-dirs
        with:
          dir_names: true
          dir_names_max_depth: "1"
          path: containers

      - name: Extract Metadata
        id: containers
        working-directory: containers
        run: |
          containers="${{ github.event_name == 'workflow_dispatch' && inputs.container || steps.changed-dirs.outputs.all_changed_and_modified_files }}"
          containers=$(printf "%s/metadata.yaml\n" ${containers})
          containers=$(yq eval-all --indent=0 --output-format=json "[.]" ${containers})
          echo "containers=${containers}" >> $GITHUB_OUTPUT

  build:
    needs: changed
    name: Build ${{ matrix.container.name }}
    uses: ./.github/workflows/build-image.yaml
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      matrix:
        container: ${{ fromJSON(needs.changed.outputs.containers) }}
      fail-fast: false
    with:
      container: ${{ matrix.container.name }}
      version: ${{ matrix.container.version }}
      dockerfile: ${{ matrix.container.dockerfile }}
      release: ${{ github.event_name == 'workflow_dispatch' && inputs.release || github.event_name == 'push' }}

  status:
    if: ${{ always() }}
    needs: build
    name: Build Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
